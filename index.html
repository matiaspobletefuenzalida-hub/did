<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Didgeridoo Maestro 3D - SEA 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Quicksand:wght@500;700&display=swap');

        :root {
            --primary: #2d1a0a;
            --accent: #d97706;
            --gold: #fbbf24;
            --text-main: 'Quicksand', sans-serif;
            --text-fun: 'Bungee', cursive;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #3e2723 0%, #000000 100%);
            color: #f8fafc;
            font-family: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Membrete 3D */
        .header-3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 110px;
            background: rgba(45, 26, 10, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            border-bottom: 4px solid var(--accent);
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-logo {
            height: 80px;
            border-radius: 12px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .header-logo:hover { transform: scale(1.1) rotate(-3deg); }

        .header-title h1 {
            margin: 0;
            font-family: var(--text-fun);
            font-size: 1.6rem;
            color: var(--gold);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            letter-spacing: 1px;
            text-align: center;
        }

        .header-title p {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 700;
            color: #d6d3d1;
            text-align: center;
        }

        /* Cuadro de Datos Curiosos */
        .fact-box {
            position: absolute;
            top: 130px;
            right: 20px;
            width: 300px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-left: 6px solid var(--gold);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            z-index: 80;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .fact-box h2 {
            font-family: var(--text-fun);
            font-size: 1.1rem;
            margin-top: 0;
            color: var(--gold);
        }

        .fact-box p {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 15px;
            color: #e7e5e4;
        }

        .next-fact-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            font-family: var(--text-main);
            transition: all 0.2s;
        }

        .next-fact-btn:hover { background: var(--gold); color: black; transform: scale(1.02); }

        #canvas-container { flex-grow: 1; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }

        .play-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(217, 119, 6, 0.9);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-family: var(--text-fun);
            font-size: 1.2rem;
            box-shadow: 0 0 30px rgba(217, 119, 6, 0.4);
            z-index: 100;
            cursor: pointer;
            border: 3px solid var(--gold);
            transition: all 0.3s;
        }

        .play-hint:hover { transform: translateX(-50%) scale(1.1); background: var(--gold); color: black; }

        #loader {
            position: fixed;
            inset: 0;
            background: #1a0f0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="loader">
    <div style="font-family: 'Bungee'; color: #fbbf24; font-size: 2rem; margin-bottom: 20px;">DIDGE-MASTER 3D</div>
    <p>Tallando madera de eucalipto australiano...</p>
</div>

<header class="header-3d">
    <img src="logo2.jpg" alt="Logo Escuela" class="header-logo">
    <div class="header-title">
        <h1>SEMANA ARTÍSTICA 2026</h1>
        <p>Instrumentos del Mundo • Escuela Santa Eugenia</p>
    </div>
    <img src="logo_header.png" alt="Logo SEA" class="header-logo">
</header>

<div class="fact-box">
    <h2>🪃 TRADICIÓN ANCESTRAL</h2>
    <p id="fact-text">El didgeridoo es uno de los instrumentos más antiguos del mundo, ¡usado hace más de 1,500 años por los aborígenes australianos!</p>
    <button class="next-fact-btn" onclick="nextFact()">¿SABÍAS QUE...?</button>
</div>

<div id="canvas-container"></div>

<button class="play-hint" id="play-button" onmousedown="startDrone()" onmouseup="stopDrone()" ontouchstart="startDrone()" ontouchend="stopDrone()">
    ¡SOPLA EL DIDGERIDOO!
</button>

<script>
/** * DATOS CURIOSOS **/
const facts = [
    "El nombre 'didgeridoo' es una onomatopeya inventada por los europeos. Los aborígenes lo llaman 'Yidaki'.",
    "Los mejores didgeridoos son troncos de eucalipto que han sido ahuecados naturalmente por termitas.",
    "Para tocarlo sin parar, los músicos usan la 'respiración circular': ¡inspiran por la nariz mientras soplan por la boca!",
    "Tradicionalmente, las pinturas que lo adornan cuentan historias sagradas de la creación llamadas 'Dreamtime'.",
    "El sonido del didgeridoo es una sola nota base llena de vibraciones que relajan el cuerpo.",
    "Se usa cera de abejas en la boquilla para que sea más cómodo apoyar los labios."
];
let currentFactIdx = 0;
function nextFact() {
    currentFactIdx = (currentFactIdx + 1) % facts.length;
    document.getElementById('fact-text').innerText = facts[currentFactIdx];
}

/** * MOTOR DE AUDIO (SÍNTESIS DE DRONE) **/
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let oscillator = null;
let gainNode = null;
let lfo = null;

function startDrone() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    oscillator = audioCtx.createOscillator();
    const subOsc = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    
    oscillator.type = 'sawtooth';
    oscillator.frequency.value = 65; 
    
    subOsc.type = 'sine';
    subOsc.frequency.value = 32.5;

    filter.type = 'lowpass';
    filter.frequency.value = 400;
    filter.Q.value = 10;

    lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 5;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 150;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);

    oscillator.connect(filter);
    subOsc.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    oscillator.start();
    subOsc.start();
    lfo.start();

    document.getElementById('play-button').innerText = "¡MANTÉN EL SOPLIDO!";
    if(didgeGroup) didgeGroup.scale.set(1.02, 1.02, 1.02);
}

function stopDrone() {
    if (oscillator) {
        gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
        setTimeout(() => {
            if(oscillator) oscillator.stop();
            if(lfo) lfo.stop();
        }, 200);
    }
    document.getElementById('play-button').innerText = "¡SOPLA EL DIDGERIDOO!";
    if(didgeGroup) didgeGroup.scale.set(1, 1, 1);
}

/** * MOTOR 3D REFINADO **/
let scene, camera, renderer, controls, didgeGroup;

function init() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 2, 8); // Posición inicial más centrada

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0); // Asegurar que el pivote sea el centro del instrumento

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xfbbf24, 1.0);
    sun.position.set(5, 8, 5);
    sun.castShadow = true;
    scene.add(sun);

    const rim = new THREE.SpotLight(0xffffff, 0.6);
    rim.position.set(-10, 5, -5);
    scene.add(rim);

    didgeGroup = new THREE.Group();

    // Geometría del Didgeridoo centrada
    const points = [];
    const height = 6;
    for (let i = 0; i < 30; i++) {
        const t = i / 29;
        // Radio que se expande hacia la campana (i=0 boquilla, i=29 campana)
        const radius = 0.15 + (Math.pow(t, 2.5) * 0.45) + (Math.sin(t * 10) * 0.015); 
        points.push(new THREE.Vector2(radius, t * height - height/2)); // Centrado en Y
    }
    const geometry = new THREE.LatheGeometry(points, 40);
    
    const woodTexture = createWoodTexture();
    const material = new THREE.MeshStandardMaterial({ 
        map: woodTexture,
        roughness: 0.8, 
        metalness: 0.05,
        color: 0xffffff // El color real viene de la textura
    });

    const didgeridoo = new THREE.Mesh(geometry, material);
    didgeridoo.rotation.z = Math.PI / 2; // Acostado horizontalmente
    didgeridoo.castShadow = true;
    didgeGroup.add(didgeridoo);

    // Boquilla de cera integrada (No flotando)
    const waxGeom = new THREE.TorusGeometry(0.16, 0.04, 16, 32);
    const waxMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.3 });
    const wax = new THREE.Mesh(waxGeom, waxMat);
    // Posicionada exactamente en el extremo de la boquilla (Y = -height/2)
    wax.position.set(0, -height/2, 0); 
    wax.rotation.x = Math.PI / 2;
    didgeridoo.add(wax);

    scene.add(didgeGroup);

    document.getElementById('loader').style.display = 'none';
    animate();
}

function createWoodTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');

    // Color base madera oscura/ocre
    ctx.fillStyle = '#6d4c41';
    ctx.fillRect(0, 0, 1024, 1024);

    // Vetas rústicas
    for(let i=0; i<800; i++) {
        ctx.fillStyle = 'rgba(40, 20, 10, 0.2)';
        ctx.fillRect(Math.random()*1024, 0, 1 + Math.random()*2, 1024);
    }

    // Decoración de puntos (Dot Painting) estilo aborigen
    const palette = ['#e6a119', '#d97706', '#fefce8', '#78350f', '#2d1a0a'];
    
    // Bandas decorativas
    for(let band=0; band<6; band++) {
        const yPos = 150 + band * 160;
        
        // Fondo de la banda
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(0, yPos - 50, 1024, 100);

        // Dibujar puntos
        for(let x=0; x<1024; x+=12) {
            for(let yOff=-40; yOff<40; yOff+=14) {
                if(Math.random() > 0.3) {
                    ctx.beginPath();
                    ctx.arc(x + (Math.random()*5), yPos + yOff, 3, 0, Math.PI*2);
                    ctx.fillStyle = palette[Math.floor(Math.random()*palette.length)];
                    ctx.fill();
                }
            }
        }
    }

    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    return texture;
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    
    // Rotación sutil y fluida
    if(didgeGroup) {
        didgeGroup.rotation.y += 0.003;
    }
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const container = document.getElementById('canvas-container');
    if(!container) return;
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});

init();
</script>
</body>
</html>
