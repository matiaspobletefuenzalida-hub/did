<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Didgeridoo Maestro 3D - SEA 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Quicksand:wght@500;700&display=swap');

        :root {
            --primary: #2d1a0a;
            --accent: #d97706;
            --gold: #fbbf24;
            --text-main: 'Quicksand', sans-serif;
            --text-fun: 'Bungee', cursive;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #3e2723 0%, #000000 100%);
            color: #f8fafc;
            font-family: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Membrete */
        .header-3d {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100px;
            background: rgba(45, 26, 10, 0.9);
            backdrop-filter: blur(12px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; box-sizing: border-box;
            border-bottom: 4px solid var(--accent); z-index: 100;
        }

        .header-logo { height: 70px; border-radius: 8px; }
        .header-title h1 { margin: 0; font-family: var(--text-fun); font-size: 1.4rem; color: var(--gold); text-align: center; }
        .header-title p { margin: 0; font-size: 0.8rem; color: #d6d3d1; text-align: center; }

        /* Cuadro de Datos */
        .fact-box {
            position: absolute;
            top: 120px; right: 20px; width: 280px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-left: 6px solid var(--gold);
            border-radius: 12px; padding: 15px; z-index: 80;
        }

        .fact-box h2 { font-family: var(--text-fun); font-size: 1rem; color: var(--gold); margin-top: 0; }
        .fact-box p { font-size: 0.9rem; line-height: 1.5; color: #e7e5e4; }

        /* Contenedor 3D (Sketchfab) */
        #canvas-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
        }
        #canvas-container iframe { width: 100%; height: 100%; border: none; }

        /* Botón de Sonido (Posición Inferior y menos invasiva) */
        .footer-ui {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; z-index: 100;
        }

        .play-hint {
            background: linear-gradient(135deg, var(--accent) 0%, #78350f 100%);
            color: white; padding: 18px 50px; border-radius: 50px;
            font-family: var(--text-fun); font-size: 1.1rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            cursor: pointer; border: 3px solid var(--gold);
            transition: all 0.3s;
        }

        .play-hint:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold); }
        .play-hint:active { transform: scale(0.95); }

        #loader {
            position: fixed; inset: 0; background: #1a0f0a;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; color: var(--gold); font-family: 'Bungee';
        }
    </style>
</head>
<body>

<div id="loader">CARGANDO DIDGERIDOO...</div>

<header class="header-3d">
    <img src="logo2.jpg" alt="Logo" class="header-logo" onerror="this.style.opacity='0'">
    <div class="header-title">
        <h1>SEMANA ARTÍSTICA 2026</h1>
        <p>Instrumentos del Mundo • Escuela Santa Eugenia</p>
    </div>
    <img src="logo_header.png" alt="SEA" class="header-logo" onerror="this.style.opacity='0'">
</header>

<div class="fact-box">
    <h2>🪃 TRADICIÓN</h2>
    <p id="fact-text">El didgeridoo es uno de los instrumentos más antiguos del mundo, ¡usado hace más de 1,500 años!</p>
</div>

<div id="canvas-container">
    <iframe title="Didgeridoo" 
            src="https://sketchfab.com/models/d83f3c2b60e34cb086f17e41085a709d/embed?autostart=1&ui_theme=dark&dnt=1">
    </iframe>
</div>

<div class="footer-ui">
    <button class="play-hint" id="play-button" 
            onmousedown="startDrone()" onmouseup="stopDrone()" 
            ontouchstart="startDrone()" ontouchend="stopDrone()">
        ¡SOPLA EL DIDGERIDOO!
    </button>
</div>

<script>
/** MOTOR DE AUDIO MEJORADO (SÍNTESIS REALISTA) **/
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let nodes = [];

function startDrone() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // 1. Oscilador Base (Rugosidad)
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = 65; // Nota Do grave

    // 2. Sub-oscilador (Presión de aire)
    const sub = audioCtx.createOscillator();
    sub.type = 'sine';
    sub.frequency.value = 32.5;

    // 3. Filtro Resonante (Vocalización)
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 500;
    filter.Q.value = 15;

    // 4. LFO para efecto de "uau-uau" rítmico
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 4.5; // Velocidad del soplido
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 300;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    const mainGain = audioCtx.createGain();
    mainGain.gain.setValueAtTime(0, audioCtx.currentTime);
    mainGain.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 0.1);

    osc.connect(filter);
    sub.connect(filter);
    filter.connect(mainGain);
    mainGain.connect(audioCtx.destination);
    
    osc.start(); sub.start(); lfo.start();
    nodes = [osc, sub, lfo, mainGain];
    
    document.getElementById('play-button').innerText = "¡MANTÉN EL SOPLIDO!";
}

function stopDrone() {
    if (nodes.length > 0) {
        const [osc, sub, lfo, gain] = nodes;
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        setTimeout(() => {
            osc.stop(); sub.stop(); lfo.stop();
        }, 300);
        nodes = [];
    }
    document.getElementById('play-button').innerText = "¡SOPLA EL DIDGERIDOO!";
}

// Ocultar loader
setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000);
</script>
</body>
</html>
